          - 'heading "수면 : 새벽3시 ~ 아침 5시 45분. 기침을 하느라 잠을 거의 자지 못하고 이사를 시작했다" [level=4] [ref=e6127]': "수면 : 새벽3시 ~ 아침 5시 45분. 기침을 하느라 잠을 거의 자지 못하고 이사를 시작했다"
          - paragraph [ref=e6128]:
            - text: 9시 10분에 짐을 모두 싸고 아스크타워로 출발. 10시 5분에 이사 완료. 원래 65만원인데 10만원 추가 요구함. 70만원으로 쇼부쳤으나 뜬금없는 주차비 요구로 72만원 입금해줌. 이건 짐싸앱에 이이 신청을 해야겠다. - 하였으나 소용없다. 이삿짐 센터에 등록한 이름과 이체를 받은 사람의 이름이 달라
            - text: 전원이 들어오지 않아 관리실에 전화해 바로 AS받고 수리함. 약 20분 걸림
            - text: 12시 30분에 인터넷 KT 500MB 연결. 월 3만원 3년 약정. 사무실 이사시 약정 자동 무효. 나중에 이사갈때 연락해서 직접 해지해야한다.
            - text: 쇼파에 누워 기절하듯 낮잠을 잤다. 하지만 기침때문에 제대로 못잠
            - text: 저녁으로 설렁탕 먹고 이사잘했다고 부모님께 알림. 부모님은 요새 기침 감기 심하다며 얼릉 병원에 가라고 하심
            - text: 저녁 9시에 다시 이전 스카이밸리 사무실로 차타고 가서 청소 깨끗히 하고 사진 찍어 사무실 주인에게 보내줌. 내일 금요일에는 담당자가 휴가라 오늘까지 확인못하면 보증금 돌려줄수 없다고 해서 어쩔수 없었음. 엄연한 계약날짜가 있는데 이런 미친소리를 하나 싶었지만 마지막이라 군소리 없이 알겠다고 함. 사진 보낸 후 약 1시간 후, 저녁 11시가 넘어 보증금과 장기수선비 합쳐서 입금됨.
            - text: 나무는 너무 놀래서 문소리만 들어도 숨어서 몇시간이고 나오지 않았다. 내가 들고 나와도 다시 숨어버렸다.
            - text: 너무나 피곤한 하루였다.
