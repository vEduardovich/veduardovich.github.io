            - text: 엔화 매수 $800, 환율이 다시 올라가고 있다. 미쯔비시ufj파이낸셜 100주 매수 - 총 500주 됐다. 엔화만 1,200만원이 되었다. 800만원어치만 더 환전하면 된다.
