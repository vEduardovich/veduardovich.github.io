            - text: 이삿짐을 싸는데 거의 만 이틀이 걸렸다. 이건
            - text: 큰 에너지를 사용하지 않고 겨우 박스작업만으로도 살이 빠진다.
            - text: 내가 헬스에서 1시간 반동안 열심히 달리고 무거운거 들었다놨다해도 나머지 시간을 앉아만 있을땐 많이 먹지 않아도 살이찌고 잠도 깊게 자지 못했다.
