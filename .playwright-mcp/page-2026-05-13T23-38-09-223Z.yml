          - paragraph [ref=e6308]:
            - text: 미쯔비시 파이낸셜은 잘가고 있다
            - text: cweb은 얼마나 더 살까. 지금까지 4,900달러가 들어갔다. 3만달러 정도는 넣어야하지 않을까.
            - text: 엔비디아 - 사팔 - 5천원이익ㅋ
            - text: 현금은 충분하다. 1억이 있다. 하지만 싸게 사야한다. 싸게 사지 않으면 아주 오랜시간을 기다려야하고 그 시간동안 다른 좋은 기회들을 놓치게 된다. 충분히 기다려라.
            - text: 우분투 24.04 버전은 역대 최악같다. 또 날아가버렸다. nvidia driver와 충돌이 있었다.
            - text: 다시 설치하였으나 fan control이 되지 않았다. 한참을 구글링해서 겨우 해결했다. 갑자기 구글 doc에서 한글도 되지 않는다. 설정 ui도 엄청 바뀌어서 여기있던게 저기로 가고 저기있던게 저저저기로 숨어버렸다. 아예 빠진것도 있고 하여간에 엉망이다. 새벽 1시 20분 스트레가 쌓여 더 이상 할수가 없었다. 날아간 도다리 코드들까지 어떻게 살려야 하나 답답하다. 내일까지 살릴수나 있을까.
            - text: 24.04 버전은 정말 최악이다 ㅠ
