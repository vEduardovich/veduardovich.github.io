                  - deletion [ref=e4510]: 밤에 자동차 보험 재가입하기
                  - text: => 매번하지만 할때마다 부담스럽다. 블랙박스 기록은 매번 새로 넣어야 하지만 막상 실제 결제하기 직전 사진이 필요없다고 한다; 이제 올해해야할 번거로운 작업들은 모두 끝났다.
            - listitem [ref=e4511]:
              - heading "일기" [level=3] [ref=e4512]
              - paragraph [ref=e4513]: 운동을 하고 사무실에 거의 돌아와서였다. 여기 사무실 건물 사이엔 널직한 야외 휴식터가 있다. 몸이 불편해 보이는 할머니 한 분이 박스들을 접어 봉투에 넣고 계셨다. 이미 밤 11시에 가까운 시간이었다. 그 모습을 보며 ‘나는 이 세상에 어떤 가치를 만들어내고 있나. 지금 나의 노력은 어떤 가치가 있기는 한걸까’ 여러 생각을 했다. 그때 할머니가 대뜸 말을 거셨다. “이것 좀 들어올려서 묶어요” 살짝 당황했지만 도와달라는 말씀이라 생각하고 운동가방을 내려놓고 박스가 담긴 봉투를 들어올려 손수레에 실었다. 하지만 이게 시작이었다. 할머니는 어눌한 말씀으로 다그치며 봉투를 뉘워라. 줄을 저기서 가져와 묶어라. 이런저런 일들을 명령하셨다. 문제는 내가 이런일에 익숙치 않다는 거였다. 어떤줄과 어떤줄을 묶으라는 건지 어떤 줄을 수레에 묶고 어떤 줄은 봉투를 고정하라는 건지 이해하지 못해 어리버리 하니 화가 나셨는지 반복적으로 묶으라고 목소리를 높이셨다. 내가 방법을 몰라 물을때마다 화를 내시며 그냥 묶으라고만 하시니 ‘그럼 제 방식으로 묶을께요’ 말씀드리고 내 스타일로 고정하고 묶었다. 그 사이 할머니가 내 운동가방을 실으려고 하셔서 그건 제 가방이라고 말씀드렸다.
          - paragraph [ref=e4514]: 겨우 묶고나자 이제는 수레를 끌고 저쪽까지 가라고 하셨다. 경사가 있는 길도 아니고 평지인데 나보고 건물밖까지 수레를 끌라는건가. 의아하게 생각하고 가만히 있으니 한심하다는듯 쳐다보시곤 수레를 자기 손에 맞도록 밑으로 내리라고 하셨다. 그리고 나서야 드디어 수레는 내 손에서 할머니의 거친 손으로 옮겨갔다. 그리고 할머니는 천천히 손수레를 끌고 건물 밖을 향하셨다. 뒷모습을 바라보며 고맙다는 말씀도 안하시네 조금 서운했는데 마지막 할머니의 화난듯한 눈빛을 떠올리면 아마 내 어리버리함 때문에 그럴수도 있었겠다고 생각했다. 돌아와서 손을 씻고 책상앞에 앉았다. 하지만 방금 전 그 일이 머릿속에서 떠나지 않았다. 왜 그렇게 할머니는 화를 내셨을까. 내가 무엇을 잘못해서일까, 단지 일을 못해서일까. 내가 이해못하고 있는 부분이 무엇이고 다시 또 그런일이 생겼을때 나는 어떻게 대응해야할까. 끝내 답을 찾지 못했다. gemini는 나와 다른 할머니의 고된삶에서 비롯된 서로간의 오해랴고 했다. 대체 할머니는 내게 무엇을 오해하셨던 걸까. 나는 할머니의 무엇을 오해한걸까. 질문만 더 많아졌다.
