          - paragraph [ref=e6040]:
            - text: 더 이상 내가 특별한 존재라고 스스로 생각하지 않고 있다는걸 깨달았다. 위대해지고 싶어 발악했는데 위대해지지도 못했고 더 이상 발악하고 있지도 않다. 여기서 그만두면 발악한적도 없는 것이 된다. 내 인생의 모든것을 물들였던 도전이였는데 너무 많은 실패에 젖어들어 도전의 설레임은 잊고 아픔과 고통과 공포만을 기억하게 되었다.
