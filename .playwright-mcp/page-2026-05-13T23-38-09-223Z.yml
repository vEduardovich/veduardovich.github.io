              - 'heading "개발 : 일단 목표는 이번달 안이다. 오늘 회원관리까지만 해보자. 그럼 해볼만하다." [level=3] [ref=e4859]'
              - list [ref=e4860]:
                - listitem [ref=e4861]:
                  - text: admin 기본 플랫폼 세팅하기 -
                  - deletion [ref=e4862]: admin은 내부서버를 이용한다
                  - text: –> 다시 변경. 서버는 새로 만들지 말고 기존 서버에 관리자 라우트를 추가해서 사용하기로 결정 –> nuxt3는 nitro라는 자체 엔진을 사용. 종일 nitro의 코드들을 살펴봤는데 nodejs를 랩핑한 것임에도 오히려 문법이 저급하고 조잡함. express같은 미들웨어 활용이 불가능함. 수많은 자체 api를 만들었고 h3같은 자신들이 만들어 자신들만 사용하는 모듈에 크게 의존하고 있음. –> 이는 한때의 유행일 확률이 높고 그 말인즉, 이제까지 nuxt가 계속 해왔던 유기 및 방치, 대체될 확률이 아주 높다는 것을 의미함. –> 내 예상에 nitro는 5년 이내에 사라지거나 또 그때그때의 유행따라 완전히 뒤엎어질 확률이 아주 높음. 즉 nuxt2나 vuetify꼴 난다는거. –> 즉, 내 결론은 nitro에 내 서버 코드들을 절대 맡길수 없다는거. 그냥 nodejs를 쓰는게 맞다는거. –> 하지만 새로 서버를 또 파는건 무리. 관리비용이 너무크다. 그래서 기존 서버에 라우트만 파기로 결정. 지금으로선 이게 가장 나은 결정같다. 확실한건 nitro는 절대 사용하면 안된다는거.
