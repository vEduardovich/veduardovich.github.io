                - text: 그런데 정말 신기한것은 주식이 잘될때 그렇게 진도가 안나가던 코딩이 주식이 폭락하자 집중도가 엄청나게 상승한다. 신기한 일이다. 어쨌든 일이 잘되니 이 부분은 기분이 좋다.
                - text: 넷마블 건물에 다녀왔다. 근처에 코워킹 사무실이 있을까 찾아보다 글로벌창업사관학교를 가보니 그곳이 넷마블 건물이었다. 그런데 입구부터 카드키로 막혀있어 들어가지 못하고 건물만 구경하고 나왔다.
                - text: 안에는 (당연히) 같은 카드키를 매고 있는 사람들이 많았다. 옛날 생각이 많이났다. 특히 젊은 여성분들이 많았는데 우리땐 남자들만 만들던 게임을 이제는 여자들도 만드는가 싶었다.
                - text: 그러면서 기업이란 무엇인가를 계속 생각했다. 이렇게 젊은 사람들에게 많은 일자리를 안겨준다는게 바로 기업의 해야할일이 아닌가 하는 생각이었다. 넷마블이 그들을 먹여 살리고 있었다. 업계에 있을때 그리고 게이머로서도 넷마블을 싫어하지만 기업으로서, 단지 고용이 많은 기업이라는 것만으로도 존중받아야 하는 것 아닌가하는 생각이 들었다.
                - text: 쿠팡에도 여자가 많았고 넷마블에도 여자가 많았지만 그 때깔이 너무나 달랐다. 나이대는 비슷한데, 한쪽은 뚱뚱하고 표정없고 그래서 못생겨보이고 생기가 없었는데, 이쪽은 그와 반대였다. 요새 넷마블은 월급을 잘주는가. 가끔 이곳에, 여기 카페에 놀러와야겠다는 생각을 했다. 그들의 노닥거리는 모습만 봐도 자극이 되었다. 또 아는 사람을 만날지도 모른다는 긴장감도 들었다.
