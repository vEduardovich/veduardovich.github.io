          - 'heading "수면 : 새벽 3시 48분 ~12시" [level=4] [ref=e3980]'
          - list [ref=e3981]:
            - listitem [ref=e3982]:
              - heading "목표" [level=3] [ref=e3983]
              - list [ref=e3984]:
                - listitem [ref=e3985]: 위스키 일주일간 끊기 - 푹자고 아침이 아닌 점심에 일어난 순간 느꼈다. 내가 알콜중독일수도 있단든걸. 지난 3일간 매일 하이볼 2잔을 마셨다. 일주일에 5,6일은 마시고 있다. 지난 3달간 그렇게 살았다. 위스키를 마시기 시작하며 수면시간이 다시 불규칙해지고 삶도 게을러졌다. 어쩌면 위스키 때문이 아닐수도 있다. 그걸 알아보려면 일단 일주일 금주를 해야알 수 있을것이다. 일주일에 1번 정도 마시는건 괜찮지만 일주일에 1번 정도만 안마시는건 문제가 있다는 것이 현재의 결론이다
                - listitem [ref=e3986]: –> 겨우 하루만에(오늘은 14일 일요일이다) 다시 약간의 위스키를 마시기로 한다. 이건 전에 마시다 남은 하이볼인데 아마 마시다 남은게 없다해도 새로 만들었을것이다. 다시 마시기로 한 이유는(아직 마시지 않았다) 새로운 감각때문이다.
                - listitem [ref=e3987]: 확실히 이제 알콜이 없이 늦은 밤에 두뇌의 창의력을 부스팅할수 있는 방법이 없다. 20대 시절에 그게 어떻게 매일밤 가능했는지는 기억이 나지 않는다. 그때 밤을 좋아했던 이유는, 밤이 되면 새로운 세계로 갈수 있었기 때문이었다. 한방울의 알콜도 필요없었다.
                - listitem [ref=e3988]: 그런데 오늘밤 아무리 노력을 해도 그때의 그 영롱한 재능이 조금도 살아나지 않는다. 분명 조금씩 올라오는것을 있는데 이것을 이끌어줄 무언가가 없으니 모든것이 뻔해보인다.
                - listitem [ref=e3989]: 어제 밤 늦게까지 자전거를 타고 다녔다. 지난주 처음 전기자전거를 끌고 안양까지 갔을때의 행복하고 모든게 신기했던 그 감정을 다시 찾을수 있을거라 당연히 생각했지만, 그렇지 않았다. 그냥 노동처럼 다녀왔다. 열심히 구석구석을 탐험했지만, 아무것도 몸속에 들어오지 않았다.
                - listitem [ref=e3990]: 차이라면 알콜의 유무뿐이었다.
                - listitem [ref=e3991]: 이제 하이볼을 마시며 또 다시 무언가 긍정적인 감각이 살아난다면,
                - listitem [ref=e3992]: 어쩔수 없을 것이다. 그렇다면 금주가 아니라 컨트롤에 권한을 위임해야할것이다.
                - listitem [ref=e3993]: 이에 오늘 하루만에 처음 약속을 버리고 다시 하이볼을 마시기로 한것이다. 지금 약간 올라온 이것을 하이볼이 어떻게 확장해줄지, 한번보자
                - listitem [ref=e3994]: –> 다시 하루가 지났다. 오늘은 월요일(15일)이다. 어제 결국 하이볼을 1잔 반을 마셨다. 그리고 마시기전과 마신후에 새로운 감각과 자극에 어떤 차이가 있는지 살펴봤다. 나의 상태와 지금 내몸의 감정과 감각들을 계속 점검했다.
                - listitem [ref=e3995]: 새로운 감각이나 자극을 줄거라는 기대와 달리 오히려 기존 명료하던 내 두뇌아 감각에 흐릿한 마스킹 테잎을 붙여 놓은것과 유사한 효과가 발생했다. 즉 흐릿함에서 오는 낯섦일뿐, 새로운 무언가가 솟아나오게 하는 감각이 아니었다. 그동안 내가 착각하고 있었다.
                - listitem [ref=e3996]: 한밤에 명료한 두뇌는 오히려 축복과 같다. 늦은밤 커피를 마실수 없다는, 혹은 커피의 효과를 기대할수 없다는 것이 알콜을 부른것 같다. 나는 ‘두뇌 보조제’를 찾고 있었고 낮에는 커피로 대응하지만 밤에 대응할만한것이 없던 것이다.
                - listitem [ref=e3997]: 돌이켜보면 20대때에는 새벽 늦은 밤에도 커피를 마셨다. 네스카페를 너무나 좋아해서 하루에 3캔씩 마셨다.
                - listitem [ref=e3998]: 어떤 음료없이 원하는 밤을 맞는건 어렵다. 하지만 알콜의 마스킹 테잎효과는 내가 원하는 효과가 아니다.
                - listitem [ref=e3999]: 예전의 커피같은 효과를 주는 어떤 음료를 찾아내야한다. 고등학교때는 녹차를 마셨다. 지금에는 약한 자극이다. 찾아보자. 일단 알콜은 아니다. 차라리 커피를 마시자.
