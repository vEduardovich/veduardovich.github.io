          - 'heading "수면 : 새벽 2시 ~ 아침 8시 30분. 오늘도 마찬가지, 기침 하느라 잠의 거의 자지 못함" [level=4] [ref=e6122]': "수면 : 새벽 2시 ~ 아침 8시 30분. 오늘도 마찬가지, 기침 하느라 잠의 거의 자지 못함"
          - paragraph [ref=e6123]:
            - text: 오전 싱크대 설치. 15만원 + 3만원. 설치 아저씨와 많은 대화를 나눔. 일거리가 1/3일 줄었다고 한다. 여기 아스크타워 입주율이 20%라고 한다ㄷㄷ
            - text: 이번 연휴가 토일월 이어져 있어서 다들 쉬는 분위기다. 우리 앞 사무실은 아예 오늘 문을 닫았다.
            - text: 점심 만두전골. 아주 맛있고 양도 많았다. 12,000원
            - text: 테무에서 옷가지 주문
            - text: 고양이 모래 주문. 나무는 아직도 적응 못하고 있다. 하지만 한밤이 되고 내가 잠자려 누우면 어둠속에서 공간들을 열심히 탐색한다.
            - text: 병원에 가서 일주일치 기침감기약 받아옴. 바로 효과가 나는것 같다.
            - text: 늦은밤, ORserver 재개통 완료
