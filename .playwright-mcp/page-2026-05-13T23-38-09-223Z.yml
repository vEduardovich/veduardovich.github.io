            - listitem [ref=e4866]: 오늘 처음으로 ai에게 두려움을 느꼈다. 클로드 코드가 날씨앱을 만든걸 보고 저 정도 디자인에 저 정도 퀄러티의 앱을 프롬프트만으로 완성된 수준으로 개발해낸다는게 놀라웠다. 그 순간 두려움을 느꼈다.
            - listitem [ref=e4867]: 예전에는 한페이지 코딩만 가능하던 ai가 이제는 로그인부터 llm서빙까지 풀스택으로 개발이 가능해진것 같다 - 이건 좀더 확인해 봐야하지만 - 어쨌든 두려움이 느껴진다. 내가 nuxt3를 익힐겸 오랜만에 만들려고 했던 앱이 4개국 동시환율 앱이었는데, 이 정도 레벨이야말로 고민할것도 없이 ai가 뚝딱하고 만들어낼것 아닌가!
