          - 'heading "수면 : 새벽 1시 40분 ~ 9시 50분. 약을 먹어서 그런가 점심때 너무나 졸린다. 1시간 낮잠" [level=4] [ref=e6091]': "수면 : 새벽 1시 40분 ~ 9시 50분. 약을 먹어서 그런가 점심때 너무나 졸린다. 1시간 낮잠"
          - paragraph [ref=e6092]:
            - text: 아사짐 앱인 짐싸의 고객센터 전화를 받고 일어났다. 역시나 ‘부당요금청구’에 대한 나의 항의는 묵살됐다. 이삿짐을 옮긴 사람들의 말을 들어보니 추가된 짐이 있었다는 이야기였다. 당연하게도 그런건 없었다. 그들은 짐이 많아 차 2대로 어려운 건데 자신들이 잘 우겨넣었으니 3대값을 받아야하겠다는 주장을 했었다. 하지만 예상대로 그들은 말을 바꾸었다. 사전에 없던 짐을 내가 추가했다는 주장이었다. 그래서 내가 대체 어떠한 짐이 추가되었다는 것이냐 물었더니 그런 짐에 대해서는 모른다고 잡아땠다. 오직 그들의 말만 듣고 사전에 없던 짐추가를 정당한 것으로 받아들였다는 것이다.
            - text: 이 논리라면 이삿짐 나르는 사람들은 언제나 값싸게 견적을 올려 일단 낙찰을 받아놓고 짐을 옮겨주면서 요금을 얼마든지 추가하면 되는 것이었다.
            - text: 아차싶어 짐싸앱에 들어가보니 처음 몇개만 이상할 정도로 리뷰가 좋고 그 다음부터는 나처럼 부당한 추가요금을 지불한 사람들의 많이 보였다.
            - text: 짐싸앱은 전면에 마치 부당한 추가요금이 전혀 없는 것처럼 광고하였으나 실상은 대부분 엄청난 추가요금을 지불하고 있었던 것이다.
            - text: 고객센터와 대화는 계속 뺑뺑이였다. 나의 주장과 짐싸는 사람들의 주장이 다르니 나보고 직접 짐싸는 사람들과 협의해서 돈을 받으라는 것이었다. 이게 대체 말이되는 말인가
            - text: 너무나 단호하고 비논리적인 주장에 대화를 단념하고 전화를 끊었다.
            - text: 돈은 중요하지 않다. 7만원 정도의 부당한 요금은 그다지 큰 금액도 아니다. 단지 기분을 더럽게 하는 금액이다. 이따위 앱을 만들고 이따위로 관리를 하면서 이런 서비스가 지속될 수 있다는게 너무나 열받고 당황스러웠다. 나와 같은 사람들은 이런 서비스를 만들지 않기 위해 엄청난 고민을 하는데 저들은 그냥 쉽고 단순하게 만들고 고객들을 속이고 등쳐먹으며 계속 돈을 벌고 있었다. 이것이 정말 화가났다.
            - text: "팁: 이사시 모든 대화를 녹음해놔라. 그리고 너무 신사적으로 대하면 안된다. 저들은 단순 노가다 꾼들임을 잊으면 안된다. 내가 이사 시작할때 빵과 음료수주고 차로 직접가서 짐들 함께 운반하고 했던게 잘못이었다. 이들은 이러한 나의 태도를 보고 오히려 착한 호구로 판단했던 것 같다. 신사적인 태도는 신사들에게만 해야한다. 개에게 신사적으로 대하면 물릴 뿐이다. 짐승은 짐승이다."
            - text: 영웅문 앱을 켜보니 주식이 회복해있었다. 천만원을 되돌려 받았다. 그런데도 기분을 잘 풀리지 않았다. 통화녹취 확 풀어버릴까 보다. 개생퀴들
            - text: "-비트코인 121백만원에 걸어놓은건 매수 실패했다"
            - text: "-사무실 주변을 돌아봤는데 근린시설이 좋다는게 이렇게 큰 만족감을 주는지 몰랐다. 주식은 아무리 올라도 직접 와닿는게 없는 사이버 머니지만 주변의 가격 싼 식자재들은 순간적으로 기분을 좋게한다. 내가 현재에서 얼마나 멀리 떨어져 살아왔는지 한번 더 느꼈다"
            - text: "-헬스장을 돌아다녔다. 스포애니는 가입비라는 기분나쁜 제도가 있어서 말았다. 이번 한달은 아예 쉴까 생각중이다"
