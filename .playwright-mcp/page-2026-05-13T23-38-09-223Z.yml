            - text: 이사짐센터 예약확정 → 저쪽에서도 확정을 해야한단다. 일단 기다려보자. 65만원. 포장하니 10만원 떨어졌다 → 저녁 11시 20분에 전화가 왔다. 시간을 7시로 변경하자고 하셔서 오케이함. 27일 아침 7시다
