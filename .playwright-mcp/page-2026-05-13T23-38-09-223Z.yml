          - 'heading "수면 : 새벽 3분 ~ 3시 30분 - 약기운 때문인지 지칠때까지 계속 잤다. 기침은 확연히 줄었지만 여전히 가끔 나오고 있다." [level=4] [ref=e6117]': "수면 : 새벽 3분 ~ 3시 30분 - 약기운 때문인지 지칠때까지 계속 잤다. 기침은 확연히 줄었지만 여전히 가끔 나오고 있다."
          - paragraph [ref=e6118]:
            - text: 이삿짐 풀기 시작
            - text: 이사하며 느꼈던 것은 내가 가지고 있는줄도 몰랐던 물건들이 꽤 많았다는 것과 혹시나 쓰이지 않을까해서 가지고 있던 물건들도 꽤 많았다는 것이다. 그래서 3년간 아예 안쓴것들은 버렸고 그럼에도 쓸수 있을 것 같은것들은 박스에 넣고 잘 안쓰는 것’과 ‘가끔은 쓰는 것’으로 구분해 정리했다. 모두 진열하는것니 공간이 너무 너져분했기 때문이다. 약 70% 풀었다.
            - text: 나무가 서서히 적응하고 있다. 아직은 작은 문소리에도 구석으로 숨어버린다.
        - listitem [ref=e6119]:
