                  - text: "제어받을 맥북 설정 (호스트) 원격으로 접속당할 맥북에는 Jump Desktop Connect라는 무료 서버 프로그램을 설치해야 합니다. 앱 설치: Jump Desktop 공식 웹사이트에서 ‘Jump Desktop Connect’를 다운로드하여 설치합니다. 권한 허용: 설치 과정 중 또는 설치 후 시스템 설정 > 개인정보 보호 및 보안에서 화면 기록과 손쉬운 사용 권한을 Jump Desktop Connect에 허용해야 합니다. 계정 등록: 앱을 실행하고 ‘Add a remote access user’를 클릭하여 본인의 Jump Desktop 계정(또는 Google 계정)으로 로그인합니다. Jump Desktop Support Jump Desktop Support"
                  - list [ref=e475]:
                    - listitem [ref=e476]: "제어할 맥북 설정 및 접속 (클라이언트) 실제로 조작을 할 맥북에는 유료 앱인 Jump Desktop이 필요합니다. 앱 준비: 맥 앱스토어 또는 웹사이트에서 구매한 ‘Jump Desktop’ 앱을 실행합니다. 로그인: 앱 상단 메뉴의 File > Sign In을 통해 제어받을 맥북에서 등록했던 것과 동일한 계정으로 로그인합니다. 연결: 계정이 동기화되면 목록에 제어받을 맥북 아이콘이 자동으로 나타납니다. 해당 아이콘을 더블 클릭하면 연결됩니다. 인증: 연결 시 원격지에 있는 맥북의 사용자 이름(User)과 암호(Password)를 입력해야 합니다. (Apple ID 암호가 아닌, 해당 맥북의 잠금 해제 암호입니다.)"
