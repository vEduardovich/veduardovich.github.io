          - paragraph [ref=e6196]:
            - text: 이사 견적을 받아보니(반포장) 75만원~ 85만원 사이다. 이건 아니다 싶어서 바로 포장에 들어갔다. 웬만한 것들을 미리 다 포장해 놓고 다시 견적을 받아보려고 한다. 돈이 문제가 아니라 궁금해서 그렇다. 어차피 다음번 이사에는 전체 포장이사로 해야할것 같다.
