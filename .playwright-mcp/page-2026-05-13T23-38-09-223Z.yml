              - paragraph [ref=e6044]:
                - text: 우리 SUPER주거래 통장 개설하자 → 최근 한달 개설내역이 있어서 지금은 못하네
                - text: 이제 회사에서 월급을 받는 형태로 나를 관리하자. 현재는 1인 기업이지만 회사 통장에서 월급을 받는 형태로 운영을 바꾼다. 작게나마 회사의 틀을 만든다.
                - text: 개인으로 계속 할지, 법인으로 바꿀지도 결정해야 한다
                - text: 월급은 400만원. 통장 개설과 함께 일단 개인으로 연습하기로 한다.
                - text: 오후 2시에 사무실 전원 검사하러 온단다 → 전원기 점검 완료. 다만 전원을 끌수 없어서 스페어만 놓고 갔다
            - listitem [ref=e6045]:
              - heading "주식" [level=4] [ref=e6046]: 주식
              - paragraph [ref=e6047]:
                - text: 항셍과 cweb은 오르고 있으나 byd를 제외한 나머지 중국 전기차들은 떨어지고 있다. 특히 샤오펑은 현재 -7%이상 폭락하고 있다.
                - text: 이것에 대한 이유는 보이지 않는다. 그렇다면 최근 너무 많이 오른것에 대한 조정일까 아니면 본격적인 하락의 시작일까
                - text: "나는 양회가 끝날때 팔기로 했던 첫번째 전략을 지키지 않았다. 이유가 있었다. 중국 산업의 분위기가 정말로 좋아지고 있었고 중국 기업들은 여전히 지독한 저평가에 시달리고 있었기 때문이다. 나는 전기차의 핵심은 자율주행이라고 생각했고 어차피 트럼프의 관세는 중국전기차와 상관없다고 판단했기에 xpeng을 선택했다. ## 3월 단기에서 중단기로 좀 더 길게 보기로 결정한 것이다."
                - text: 하지만 그 후 27에서 23.5로 폭락했다. 다시 추매를 시작해서 4,750주가 되었다. 오르는 것에 베팅했다. 반대로 cweb은 80주를 팔아서 380주가 되었다.
                - text: 중국 주식은 오르고 있다. byd도 폭등했다. 그렇다면 이건 중국 전반에 걸친 문제로 벌어진 폭락은 아닐것이다. 나는 이것을 차익실현으로 본다. 그렇다면 좀 더 가져가는 것이 맞다고 본다.
                - text: 이 판단이 맞을까? 연속된 폭락장 한가운데에서 제대로 판단하고 있는것일까? 예전처럼 이대로 폭락을 시작해 그대로 망해버리는건 아닐까
                - text: 오늘은 이 베팅 그대로 간다. 내일은 내일 생각하자
