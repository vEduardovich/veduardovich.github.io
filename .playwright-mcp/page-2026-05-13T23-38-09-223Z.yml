            - text: 그저께부터 열심히 deepseek을 사용해봤다. 충격 그 자체다. 이걸 보고 있자니 내가 새로바뀐 프레임 사용법이나 익히고 있다는게 너무나 한심하게 느껴졌다. 세상을 바꾼다는건 저런 것이다. 중국산이다보니 처음에는 많은 사람들이 비하를 하더니 결과가 입증된 지금에는 과정을 구라라고 확신하고 있다. 모든걸 오픈한 deepseek이 거의 모든걸 숨긴 openAI보다 의심을 받는다니, 대중이 가진 관념적 브랜드라는 건 참으로 신기한 것이다. 특히 대한민국은 이상한 나라다. 너무나 이상한 나라다. 공학을 문학으로 해석한다.
