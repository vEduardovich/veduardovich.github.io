            - text: 예상대로 목이 아파 밤새 힘들었다. 왼쪽 코가 막혀 숨도 잘쉬지 못했다. 신기한것은 기상 후 코를 풀고 나니 마치 감기가 다 나은것처럼 목도 안아프고 몸이 쾌청해졌다. 이제 막 시작한 감기인데 이상하다. 오늘 밤 잘때 상태를 보면 확실히 알수 있을것이다.
            - text: 샤오펑 50주 추매 - 샤오펑이 또 떨어지고 있다. 이번에는 50주만 매수하려고 한다. 지난 번 올랐을때 50주라도 매도했다면 이번의 매수가 좀더 쉬웠을텐데 하필 패턴을 버리자 다시 하락이 시작되었다. 다음번에는 이를 꼭 기억하자.
