---
layout: default
---

<h1>{{ page.year }}년 기록</h1>

<ul class="post-list" style='margin-top:50px;'>
  {% for post in site.posts %}
    {% assign post_year = post.date | date: "%Y" %}
    {% if post_year == page.year %}
      <li>
        <h3>
          <a class="post-link" href="{{ post.url | relative_url }}">
            {{ post.title | escape }}
          </a>
        </h3>
        {{ post.content }}
      </li>
    {% endif %}
  {% endfor %}
</ul>
